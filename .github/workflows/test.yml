name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Only install what tests actually need (skip the 1 GB BGE-M3 chain)
          python -m pip install pyyaml pytest pytest-cov

      - name: Run pytest (skip BGE-M3-requiring tests)
        run: pytest -v -m "not requires_bge"

      - name: Lint imports
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          # Basic sanity: scripts must import without errors
          cd scripts
          python -c "import _paths"
          python -c "import verify"
          python -c "import rebuild_index"
          python -c "import note"
          python -c "import _safe_io"
          python -c "import _hook_runner"
